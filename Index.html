<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
    .app-container { max-width: 480px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; position: relative; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); padding-bottom: 80px;}
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    @media print {
      body * { visibility: hidden; }
      #print-area, #print-area * { visibility: visible; }
      #print-area { position: absolute; left: 0; top: 0; width: 58mm; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>

<div class="app-container">
  
  <!-- HEADER -->
  <div class="bg-[#0b427a] text-white pt-10 pb-16 px-6 rounded-b-[40px] relative">
    <div class="flex justify-between items-start">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center shadow">
          <span class="text-[#0b427a] font-bold text-2xl">S</span>
        </div>
        <div>
          <h1 class="text-xl font-bold tracking-wide">SANSTECH</h1>
          <p class="text-[10px] tracking-widest uppercase opacity-80">ERP POS Sistem</p>
        </div>
      </div>
    </div>
  </div>

  <!-- MENU UTAMA -->
  <div class="px-6 py-6 -mt-10 relative z-10 bg-white rounded-t-3xl">
    <h2 class="text-xs font-bold text-gray-800 mb-4 tracking-wider">MENU UTAMA</h2>
    <div class="grid grid-cols-4 gap-y-6 gap-x-2 text-center">
      
      <!-- POS -->
      <div class="cursor-pointer hover:scale-105 transition transform" onclick="eksekusiPembayaranPOS()">
        <div class="w-12 h-12 mx-auto bg-blue-500 text-white rounded-xl shadow-sm flex items-center justify-center mb-2">
          <i class="fa-solid fa-calculator text-xl"></i>
        </div>
        <p class="text-[10px] font-medium text-gray-600 leading-tight">POS<br><span class="text-[8px]">(Kasir)</span></p>
      </div>

      <!-- Produk -->
      <div class="cursor-pointer hover:scale-105 transition transform">
        <div class="w-12 h-12 mx-auto bg-orange-400 text-white rounded-xl shadow-sm flex items-center justify-center mb-2">
          <i class="fa-solid fa-cube text-xl"></i>
        </div>
        <p class="text-[10px] font-medium text-gray-600">Produk</p>
      </div>
      
      <!-- Laporan -->
      <div class="cursor-pointer hover:scale-105 transition transform">
        <div class="w-12 h-12 mx-auto bg-purple-600 text-white rounded-xl shadow-sm flex items-center justify-center mb-2">
          <i class="fa-solid fa-chart-simple text-xl"></i>
        </div>
        <p class="text-[10px] font-medium text-gray-600">Laporan</p>
      </div>

    </div>
  </div>

</div>

<!-- AREA PRINT -->
<div id="print-area" class="hidden"></div>

<script>
  // Script untuk mengambil data dan simpan transaksi
  document.addEventListener("DOMContentLoaded", function() {
    console.log("Aplikasi siap.");
  });

  function eksekusiPembayaranPOS() {
    var dataKasir = {
       pelanggan_id: "Umum",
       subtotal: 150000, diskon: 0, pajak: 0, total_akhir: 150000,
       metode_bayar: "Tunai", kasir: "Admin_Utama",
       keranjang: [{id_produk: "PRD-001", qty: 1, harga: 150000, total: 150000}]
    };

    alert("Memproses transaksi...");
    google.script.run
      .withSuccessHandler(function(response) {
        if(response.status === "SUKSES") {
          alert("Transaksi Sukses! No Invoice: " + response.invoice);
        } else {
          alert("Gagal: " + response.pesan);
        }
      })
      .simpanTransaksiPOS(dataKasir);
  }
</script>
</body>
</html>
