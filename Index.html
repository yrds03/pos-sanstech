<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANSTECH ERP</title>
    
    <!-- Memanggil File Manifest PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f1f5f9; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>

    <!-- PENTING: Ganti link src di bawah dengan LINK GOOGLE SCRIPT ANDA -->
    <!-- allow="bluetooth; camera" adalah nyawa agar hardware HP bisa diakses! -->
    <iframe 
        src="https://script.google.com/macros/s/GANTI_DENGAN_ID_SCRIPT_ANDA/exec" 
        allow="camera; microphone; bluetooth; usb; display-capture" 
        allowfullscreen>
    </iframe>

    <script>
        // Mendaftarkan Service Worker agar web bisa di-install ke Homescreen HP
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA Service Worker Sukses Terdaftar!', reg.scope))
                    .catch(err => console.log('PWA Error:', err));
            });
        }
    </script>
</body>
</html>
