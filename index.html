<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANSTECH ERP</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f1f5f9; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>
    <!-- JANGAN LUPA GANTI LINK DI BAWAH INI DENGAN LINK GOOGLE SCRIPT ANDA -->
    <iframe 
        id="app-frame"
        src="https://script.google.com/macros/s/AKfycby8YIbvdHIw5c-PBnkxQttcQWtLbzhmeTb0xkxN74oK5tlWGpiRBHxO5vTl6AKL-5Q2/exec" 
        allow="camera; microphone; bluetooth; usb; display-capture" 
        allowfullscreen>
    </iframe>

    <script>
        // Trik rahasia memaksa HP meng-update sistem
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js?v=4');

        let deferredPrompt = null;
        let isAppReady = false;

        // 1. Menahan Pop-up Atas Bawaan Chrome
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); // Mencegah banner dari atas turun!
            deferredPrompt = e;
            
            // Jika Google Script sudah bilang "Ready", langsung kirim perintah
            if (isAppReady) {
                document.getElementById('app-frame').contentWindow.postMessage({ action: 'PWA_READY' }, '*');
            }
        });

        // 2. Mesin Komunikasi
        let btDevice = null;
        let btCharacteristic = null;

        window.addEventListener('message', async (event) => {
            let msg = event.data;

            // Jika menerima pesan bahwa Google Script sudah selesai Loading
            if (msg.action === 'APP_READY') {
                isAppReady = true;
                if (deferredPrompt) {
                    event.source.postMessage({ action: 'PWA_READY' }, '*');
                }
            }

            // Jika Tombol Install di Google Script ditekan
            if (msg.action === 'DO_INSTALL') {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') event.source.postMessage({ action: 'PWA_INSTALLED' }, '*');
                    deferredPrompt = null;
                }
            }

            // Jika Bluetooth Ditekan
            if (msg.action === 'CONNECT_BT') {
                try {
                    btDevice = await navigator.bluetooth.requestDevice({
                        acceptAllDevices: true,
                        optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb', 'e7810a71-73ae-499d-8c15-faa9aef0c3f2']
                    });
                    const server = await btDevice.gatt.connect();
                    const services = await server.getPrimaryServices();
                    const characteristicList = await services[0].getCharacteristics();
                    btCharacteristic = characteristicList.find(c => c.properties.write || c.properties.writeWithoutResponse);
                    
                    event.source.postMessage({ action: 'BT_CONNECTED', name: btDevice.name }, '*');
                } catch (err) {
                    event.source.postMessage({ action: 'BT_ERROR', error: err.message }, '*');
                }
            } 
            
            if (msg.action === 'PRINT_BT') {
                try {
                    if (!btCharacteristic) throw new Error("Printer terputus!");
                    let encoder = new TextEncoder();
                    let data = encoder.encode(msg.text);
                    for (let i = 0; i < data.length; i += 20) {
                        await btCharacteristic.writeValue(data.slice(i, i + 20));
                    }
                    event.source.postMessage({ action: 'PRINT_SUCCESS' }, '*');
                } catch (err) {
                    event.source.postMessage({ action: 'BT_ERROR', error: err.message }, '*');
                }
            }
        });
    </script>
</body>
</html>
