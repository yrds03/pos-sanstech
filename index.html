<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANSTECH ERP</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f1f5f9; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>
    <!-- PENTING: Paste Link Web App Google Script Anda di bawah ini! -->
    <iframe 
        id="app-frame"
        src="https://script.google.com/macros/s/AKfycby8YIbvdHIw5c-PBnkxQttcQWtLbzhmeTb0xkxN74oK5tlWGpiRBHxO5vTl6AKL-5Q2/exec" 
        allow="camera; microphone; bluetooth; usb; display-capture" 
        allowfullscreen>
    </iframe>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=5'); // Paksa baca versi 5
        }

        let deferredPrompt = null;

        // 1. Tangkap Sinyal PWA Chrome
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); // Matikan banner atas
            deferredPrompt = e;
            
            // JURUS PING AGRESIF: Tembak Google Script setiap 1 detik agar tombol muncul
            let pingInterval = setInterval(() => {
                const iframe = document.getElementById('app-frame');
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({ action: 'PWA_READY' }, '*');
                }
            }, 1000);

            // Berhenti nembak setelah 10 detik biar HP tidak berat
            setTimeout(() => clearInterval(pingInterval), 10000);
        });

        // 2. Mesin Bluetooth & Install
        let btDevice = null;
        let btCharacteristic = null;

        window.addEventListener('message', async (event) => {
            let msg = event.data;

            // Membalas pesan jika Google Script sudah Loading
            if (msg.action === 'APP_READY') {
                if (deferredPrompt) {
                    event.source.postMessage({ action: 'PWA_READY' }, '*');
                }
            }

            // Jika Tombol Install (di bawah Login) ditekan
            if (msg.action === 'DO_INSTALL') {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        event.source.postMessage({ action: 'PWA_INSTALLED' }, '*');
                    }
                    deferredPrompt = null;
                }
            }

            // Jika Tombol Connect BT ditekan (Muncul Jendela Asli Android)
            if (msg.action === 'CONNECT_BT') {
                try {
                    btDevice = await navigator.bluetooth.requestDevice({
                        acceptAllDevices: true,
                        optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb', 'e7810a71-73ae-499d-8c15-faa9aef0c3f2']
                    });
                    const server = await btDevice.gatt.connect();
                    const services = await server.getPrimaryServices();
                    const characteristicList = await services[0].getCharacteristics();
                    btCharacteristic = characteristicList.find(c => c.properties.write || c.properties.writeWithoutResponse);
                    
                    event.source.postMessage({ action: 'BT_CONNECTED', name: btDevice.name }, '*');
                } catch (err) {
                    event.source.postMessage({ action: 'BT_ERROR', error: err.message }, '*');
                }
            } 
            
            // Eksekusi Print
            if (msg.action === 'PRINT_BT') {
                try {
                    if (!btCharacteristic) throw new Error("Printer terputus!");
                    let encoder = new TextEncoder();
                    let data = encoder.encode(msg.text);
                    for (let i = 0; i < data.length; i += 20) {
                        await btCharacteristic.writeValue(data.slice(i, i + 20));
                    }
                    event.source.postMessage({ action: 'PRINT_SUCCESS' }, '*');
                } catch (err) {
                    event.source.postMessage({ action: 'BT_ERROR', error: err.message }, '*');
                }
            }
        });
    </script>
</body>
</html>
